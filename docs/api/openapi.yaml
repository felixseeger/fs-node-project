openapi: 3.1.0
info:
  title: Nodespace API
  version: 0.1.0
  summary: API for the Nodespace AI pipeline editor.
  description: >
    First-pass OpenAPI specification generated from the current Express route tree.
    The API is primarily a proxy/orchestration layer over third-party AI providers
    for image, video, audio, workflow generation, and LLM-assisted utilities.
servers:
  - url: http://localhost:3001
    description: Local development
tags:
  - name: Health
  - name: Utility
  - name: Images
  - name: Image Editing
  - name: Vision
  - name: Videos
  - name: Audio
  - name: AI Workflow
  - name: Recraft
  - name: Quiver
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string

  /api/generate-name:
    get:
      tags: [Utility]
      summary: Generate a project name
      responses:
        '200':
          description: Generated name
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string

  /api/generate-image:
    post:
      tags: [Images]
      summary: Generate an image
      description: Starts an image generation job using Google or Freepik-backed services.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlexibleGenerationRequest'
      responses:
        '200':
          description: Job started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncTaskResponse'

  /api/generate-kora:
    post:
      tags: [Images]
      summary: Generate a realism-focused image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlexibleGenerationRequest'
      responses:
        '200':
          description: Job started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncTaskResponse'

  /api/status/{taskId}:
    get:
      tags: [Images]
      summary: Poll generic image-generation status
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - in: query
          name: model
          schema:
            type: string
          description: Optional model hint forwarded to provider polling.
      responses:
        '200':
          description: Current task state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncTaskResponse'

  /api/upload-image:
    post:
      tags: [Images]
      summary: Upload one or more images
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  maxItems: 5
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Uploaded images converted to data URLs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  urls:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer

  /api/upscale-creative:
    post:
      tags: [Image Editing]
      summary: Start creative upscale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlexibleGenerationRequest'
      responses:
        '200':
          $ref: '#/components/responses/AsyncTaskStarted'

  /api/upscale-creative/{taskId}:
