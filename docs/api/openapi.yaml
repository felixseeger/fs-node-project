components:
  parameters:
    TaskId:
      in: path
      name: taskId
      required: true
      schema:
        type: string
      description: Provider task identifier.
    TaskIdAsModePath:
      in: path
      name: mode
      required: true
      schema:
        type: string
      description: >
        This GET path segment is actually the task id for routes whose polling path
        reuses the same route template as the POST variant.
    Mode:
      in: path
      name: mode
      required: true
      schema:
        type: string
      description: Provider-specific generation mode.
    Resolution:
      in: path
      name: resolution
      required: true
      schema:
        type: string
      description: Provider-specific resolution selector.
  responses:
    AsyncTaskStarted:
      description: Asynchronous task was started
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AsyncTaskResponse'
    AsyncTaskCurrentState:
      description: Current asynchronous task state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AsyncTaskResponse'
  schemas:
    FlexibleGenerationRequest:
      type: object
      additionalProperties: true
      description: >
        Provider-specific request body. Common fields include prompt, image_url,
        images, model, aspect_ratio, resolution, duration, and other node-driven settings.
      properties:
        prompt:
          type: string
        model:
          type: string
        image_url:
          type: string
        image:
          type: string
        images:
          type: array
          items:
            type: string
    AsyncTaskResponse:
      type: object
      additionalProperties: true
      properties:
        data:
          type: object
          additionalProperties: true
          properties:
            id:
              type: string
            status:
              type: string
              examples: [PENDING, IN_PROGRESS, COMPLETED, FAILED]
            generated:
              type: array
              items:
                type: string
        error:
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
    GenericObject:
      type: object
      additionalProperties: true
