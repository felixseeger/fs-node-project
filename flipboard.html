<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Keyboard Grid</title>
    <style>
        /* 1. Base Styling for the Grid Container */
        .keyboard {
            display: grid;
            /* Define the grid structure based on the image (4 rows, 9 columns) */
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(4, auto);
            gap: 5px;
            /* Space between keys */
            width: 80%;
            margin: 50px auto;
            border: 2px solid #333;
            padding: 10px;
            background-color: #eee;
        }

        /* 2. Styling for Individual Keys */
        .key {
            width: 100%;
            height: 60px;
            /* Adjust height as needed */
            background-color: #f0f0f0;
            /* Light gray background */
            border: 1px solid #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            /* Indicates it is clickable */
            user-select: none;
            /* Prevents text selection */
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            /* Crucial for smooth transitions */
            transition: background-color 0.15s ease-in-out, transform 0.1s ease-in-out, box-shadow 0.15s ease-in-out;
        }

        /* 3. Interaction Animation (The "Working" Part) */

        /* Hover Effect: Changes background color and lifts the key slightly */
        .key:hover {
            background-color: #e0e0e0;
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.2);
        }

        /* Active/Press Effect: Simulates the key being pressed down */
        .key:active {
            background-color: #c0c0c0;
            /* Darker gray when pressed */
            transform: translateY(2px);
            /* Moves the key down 2 pixels */
            box-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>

    <div class="keyboard">
        <!-- Row 1 -->
        <div class="key">A</div>
        <div class="key">B</div>
        <div class="key">C</div>
        <div class="key">D</div>
        <div class="key">E</div>
        <div class="key">F</div>
        <div class="key">G</div>
        <div class="key">H</div>
        <div class="key">I</div>

        <!-- Row 2 -->
        <div class="key">J</div>
        <div class="key">K</div>
        <div class="key">L</div>
        <div class="key">M</div>
        <div class="key">N</div>
        <div class="key">O</div>
        <div class="key">P</div>
        <div class="key">Q</div>
        <div class="key">R</div>

        <!-- Row 3 -->
        <div class="key">S</div>
        <div class="key">T</div>
        <div class="key">U</div>
        <div class="key">V</div>
        <div class="key">W</div>
        <div class="key">X</div>
        <div class="key">Y</div>
        <div class="key">Z</div>
        <div class="key"></div>

        <!-- Row 4 -->
        <div class="key">0</div>
        <div class="key">1</div>
        <div class="key">2</div>
        <div class="key">3</div>
        <div class="key">4</div>
        <div class="key">5</div>
        <div class="key">6</div>
        <div class="key">7</div>
        <div class="key">8</div>
        <div class="key">9</div>
    </div>

</body>

</html>
