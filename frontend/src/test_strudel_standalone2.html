<!doctype html>
<html>
<head>
  <script src="https://unpkg.com/@strudel/web@1.3.0/dist/strudel.standalone.js"></script>
</head>
<body>
  <strudel-repl id="my-repl">s("bd hh sd hh")</strudel-repl>
  <button id="btn">Play</button>
  <script>
    const repl = document.getElementById('my-repl');
    console.log(repl);
    document.getElementById('btn').addEventListener('click', async () => {
      console.log('typeof play', typeof repl.play);
      if (typeof repl.play === 'function') {
        repl.play();
      }
    });
  </script>
</body>
</html>
